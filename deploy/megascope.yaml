# megascope — deploy to the Rivendell cluster. Apply with:
#   kubectl apply -f deploy/megascope.yaml
# (or point an ArgoCD Application at this path).
apiVersion: v1
kind: Namespace
metadata:
  name: megascope
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: megascope
  namespace: megascope
---
# Read-only access to Gateway API HTTPRoutes cluster-wide (for discovery).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: megascope-httproute-reader
rules:
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: megascope-httproute-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: megascope-httproute-reader
subjects:
  - kind: ServiceAccount
    name: megascope
    namespace: megascope
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: megascope
  namespace: megascope
  labels:
    app.kubernetes.io/name: megascope
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: megascope
  template:
    metadata:
      labels:
        app.kubernetes.io/name: megascope
    spec:
      serviceAccountName: megascope
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: megascope
          # Build + push this image (CI TBD): docker build -t ghcr.io/petzkod5/megascope:latest .
          image: ghcr.io/petzkod5/megascope:latest
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: megascope
  namespace: megascope
spec:
  selector:
    app.kubernetes.io/name: megascope
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: megascope
  namespace: megascope
  # megascope discovers itself too — these annotations customise its own tile.
  annotations:
    megascope.petzko.sh/name: Megascope
    megascope.petzko.sh/group: Platform
    megascope.petzko.sh/icon: "◎"
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: web
  hostnames:
    - megascope.home.local
  rules:
    - backendRefs:
        - name: megascope
          port: 80
