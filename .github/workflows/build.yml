name: build

# Build the megascope image and publish it to GitHub Container Registry.
# Pushes happen on main and on version tags; pull requests build only (no push).
# release.yml calls this workflow (workflow_call) with the released version to
# publish the image + chart with the default GITHUB_TOKEN (no PAT needed).
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Optional version (X.Y.Z) to also tag the image and publish the chart. Leave empty to just rebuild latest.
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      version:
        description: Release version (X.Y.Z) to tag the image and chart with.
        required: true
        type: string

# Publish to ghcr.io/<owner>/megascope — works for any fork without changes.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: build-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        # Skip on PRs — no credentials needed for build-only.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # When called by release.yml the trigger ref is main (not a tag), so the
      # semver tag patterns below produce nothing — derive the version tags here.
      - name: Derive release version tags
        id: relver
        if: inputs.version != ''
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "full=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "minor=${VERSION%.*}" >> "$GITHUB_OUTPUT"

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.relver.outputs.full }},enable=${{ inputs.version != '' }}
            type=raw,value=${{ steps.relver.outputs.minor }},enable=${{ inputs.version != '' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart-publish:
    name: publish chart
    # Release-driven: on v* tags (manual) or when called by release.yml with a
    # version. Chart version/appVersion come from the tag or the input.
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.version != '' }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Derive chart version from input or tag
        id: ver
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR (Helm)
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package chart
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: helm package charts/megascope --version "$VERSION" --app-version "$VERSION" --destination dist

      - name: Push chart to GHCR (OCI)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: helm push "dist/megascope-${VERSION}.tgz" "oci://ghcr.io/${OWNER}/charts"
