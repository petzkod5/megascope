apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "megascope.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "megascope.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: healthz
      image: busybox:1.37
      command: ["wget"]
      args:
        - "--spider"
        - "-q"
        - "http://{{ include "megascope.fullname" . }}:{{ .Values.service.port }}/healthz"
