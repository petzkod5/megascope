{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "megascope.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "megascope.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "megascope.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- if .Values.networkPolicy.ingress }}
    {{- toYaml .Values.networkPolicy.ingress | nindent 4 }}
    {{- else }}
    # Default: allow traffic to the http port from any source.
    - ports:
        - protocol: TCP
          port: http
    {{- end }}
  egress:
    {{- if .Values.networkPolicy.egress }}
    {{- toYaml .Values.networkPolicy.egress | nindent 4 }}
    {{- else }}
    # Default: allow DNS, and TCP to the API server + common probe ports.
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
        - protocol: TCP
          port: 8080
    {{- end }}
{{- end }}
